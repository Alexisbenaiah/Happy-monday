<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#06142e,#0b1f45,#112d63);
    position:relative;
}

/* Background Stars */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.star{
    position:absolute;
    color:rgba(255,255,255,.8);
    animation:floatStar linear infinite;
}

@keyframes floatStar{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

/* Container */
.container{
    text-align:center;
    z-index:2;
}

.title{
    color:white;
    font-size:1.5rem;
    margin-bottom:30px;
    text-shadow:0 0 20px rgba(255,255,255,.4);
}

.subtitle{
    color:rgba(255,255,255,.8);
    margin-top:20px;
}

/* Gift Box */
.gift-box{
    width:180px;
    height:180px;
    margin:auto;
    position:relative;
    cursor:pointer;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

.box{
    position:absolute;
    bottom:0;
    width:180px;
    height:120px;
    background:#5fa8ff;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.ribbon-v{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:28px;
    height:120px;
    background:white;
}

.ribbon-h{
    position:absolute;
    top:45px;
    width:180px;
    height:28px;
    background:white;
}

.lid{
    position:absolute;
    top:15px;
    left:-10px;
    width:200px;
    height:50px;
    background:#7cbcff;
    border-radius:15px;
    transition:1s ease;
    transform-origin:left center;
}

.lid::before{
    content:"🎀";
    position:absolute;
    left:50%;
    top:-35px;
    transform:translateX(-50%);
    font-size:42px;
}

.open .lid{
    transform:rotate(-125deg);
}

/* Envelope */
.envelope{
    position:absolute;
    width:120px;
    height:80px;
    background:white;
    left:50%;
    top:70px;
    transform:translateX(-50%);
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    opacity:0;
}

.show-envelope{
    animation:riseEnvelope 1.2s forwards;
}

@keyframes riseEnvelope{
    0%{
        transform:translate(-50%,0);
        opacity:0;
    }
    100%{
        transform:translate(-50%,-120px);
        opacity:1;
    }
}

/* Letter Modal */
.letter{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:90%;
    max-width:650px;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:35px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    transition:.6s;
    z-index:100;
}

.letter.show{
    transform:translate(-50%,-50%) scale(1);
}

.letter h2{
    text-align:center;
    color:#214c9d;
    margin-bottom:20px;
}

.text{
    color:#444;
    line-height:1.9;
    font-size:1.05rem;
    white-space:pre-line;
    min-height:250px;
}

.close-btn{
    margin:25px auto 0;
    display:block;
    border:none;
    background:#214c9d;
    color:white;
    padding:12px 28px;
    border-radius:30px;
    cursor:pointer;
}

.glow{
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(100,180,255,.15);
    border-radius:50%;
    filter:blur(40px);
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

@media(max-width:600px){
    .title{
        font-size:1.2rem;
    }

    .text{
        font-size:.95rem;
    }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="glow"></div>

<div class="container">

    <div class="title">
        💙 To Nursy Shekaina Aerielle
    </div>

    <div class="gift-box" id="giftBox">

        <div class="lid"></div>

        <div class="envelope" id="envelope">
            💌
        </div>

        <div class="box">
            <div class="ribbon-v"></div>
            <div class="ribbon-h"></div>
        </div>

    </div>

    <div class="subtitle">
        Tap the gift box ✨
    </div>

</div>

<div class="letter" id="letter">

    <h2>For Tonight 💙</h2>

    <div class="text" id="typewriter"></div>

    <button class="close-btn" onclick="closeLetter()">
        Close
    </button>

</div>

<script>
const giftBox = document.getElementById("giftBox");
const envelope = document.getElementById("envelope");
const letter = document.getElementById("letter");
const typewriter = document.getElementById("typewriter");

const message = `The night ahead may be long, but so is your strength.

There will be people who feel a little less afraid, a little more comfortable, and a little more hopeful simply because you're there.

You may not realize it, but your presence alone makes a difference.

So whatever tonight brings, trust yourself.

You've made it through every difficult shift before this one.

And you'll make it through this one too.

✨ I'm rooting for you.`;

let opened = false;

giftBox.addEventListener("click", () => {

    if(opened) return;
    opened = true;

    giftBox.classList.add("open");
    envelope.classList.add("show-envelope");

    setTimeout(() => {
        letter.classList.add("show");
        typeText();
    }, 1500);
});

function typeText(){
    let i = 0;
    typewriter.innerHTML = "";

    const typing = setInterval(() => {
        typewriter.innerHTML += message.charAt(i);
        i++;

        if(i >= message.length){
            clearInterval(typing);
        }
    }, 25);
}

function closeLetter(){
    letter.classList.remove("show");
}

/* Stars */
const stars = document.getElementById("stars");

for(let i=0;i<50;i++){
    const star = document.createElement("div");

    star.className = "star";
    star.innerHTML = Math.random() > .5 ? "✨" : "⭐";

    star.style.left = Math.random()*100 + "%";
    star.style.fontSize = (10 + Math.random()*18) + "px";
    star.style.animationDuration = (8 + Math.random()*12) + "s";
    star.style.animationDelay = Math.random()*10 + "s";

    stars.appendChild(star);
}
</script>

</body>
</html>
